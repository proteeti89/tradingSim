<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ──────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ──────────────────────────────────────────────────────────────────────────────
const DEFAULT_WATCHLIST = [
  'NVDA','AAPL','MSFT','TSLA','META','AMZN','GOOG','AMD','AVGO',
  'NFLX','PLTR','SNOW','MS','GS','IBM','ORCL','NKE','PFE','NVO',
  'TSM','RDDT','ETSY','ZM','CRWV','DUOL','EL','PG','INTC','SMCI',
  'BBAI','SPY','QQQM','VTI','VT','NANC'
];
// Keep WATCHLIST as a fallback for non-Dashboard references
const WATCHLIST = DEFAULT_WATCHLIST;

const STARTING_CAPITAL = 100_000;
const MAX_POSITIONS    = 10;
const POSITION_PCT     = 0.10;   // 10% of portfolio value per trade
const POLL_MS          = 60_000; // refresh every 60 s
const BARS_WARMUP      = 100;    // historical bars to load per symbol
const DATA_API         = 'https://data.alpaca.markets';
const BROKER_API       = 'https://paper-api.alpaca.markets';

const STRATEGIES = [
  {
    id:'sma', name:'SMA Crossover', color:'#3b82f6',
    defaultParams: { shortP:9, longP:21 },
    tagline: 'Trend-following via moving average crossover',
    description: 'Buys when the fast moving average crosses above the slow one — a "golden cross" signalling upward momentum. Sells on the reverse "death cross". Because MAs are computed over past prices, the signals lag slightly behind price action. Works best when markets are trending clearly in one direction; tends to whipsaw in choppy, sideways conditions.',
    bestFor: 'Trending markets',
    paramDefs: [
      { key:'shortP', label:'Fast Period',  min:3,  max:50,  step:1,   hint:'Number of bars for the fast (short) moving average' },
      { key:'longP',  label:'Slow Period',  min:10, max:200, step:1,   hint:'Number of bars for the slow (long) moving average — must be > Fast Period' },
    ]
  },
  {
    id:'rsi', name:'RSI Strategy', color:'#10b981',
    defaultParams: { period:14, lo:30, hi:70 },
    tagline: 'Mean-reversion based on momentum exhaustion',
    description: 'The RSI is a 0–100 oscillator measuring the speed and magnitude of recent price changes. Readings below 30 suggest a stock has been oversold and may bounce — that\'s the buy signal. Readings above 70 suggest overbought conditions — that\'s the sell signal. Works best in ranging, sideways markets; in strong trends, RSI can stay "overbought" for extended periods.',
    bestFor: 'Ranging / sideways markets',
    paramDefs: [
      { key:'period', label:'RSI Period',       min:5,  max:50, step:1, hint:'Lookback window used to calculate RSI' },
      { key:'lo',     label:'Oversold Level',   min:10, max:40, step:1, hint:'RSI below this → BUY signal (lower = fewer, stronger signals)' },
      { key:'hi',     label:'Overbought Level', min:60, max:90, step:1, hint:'RSI above this → SELL signal (higher = fewer, stronger signals)' },
    ]
  },
  {
    id:'macd', name:'MACD', color:'#f59e0b',
    defaultParams: { fast:12, slow:26, sig:9 },
    tagline: 'Momentum via moving average convergence/divergence',
    description: 'The MACD line is the difference between a fast EMA and a slow EMA. The signal line is an EMA of the MACD line. A buy fires when the histogram (MACD minus signal) crosses from negative to positive — momentum is building upward. Sell when it crosses back negative. Versatile: works in both trending and transitional markets, and is one of the most widely used indicators.',
    bestFor: 'Trending & transitional markets',
    paramDefs: [
      { key:'fast', label:'Fast EMA',    min:3,  max:30, step:1, hint:'Period for the fast exponential moving average' },
      { key:'slow', label:'Slow EMA',    min:10, max:50, step:1, hint:'Period for the slow EMA — must be > Fast EMA' },
      { key:'sig',  label:'Signal Line', min:3,  max:20, step:1, hint:'EMA of the MACD line used to generate crossover signals' },
    ]
  },
  {
    id:'bb', name:'Bollinger Bands', color:'#ec4899',
    defaultParams: { period:20, mult:2 },
    tagline: 'Volatility-based mean reversion',
    description: 'Plots bands at ±N standard deviations around a moving average. Statistically, prices stay within ±2 std dev ~95% of the time. Buys when price crosses below the lower band (unusually cheap vs. recent range), sells when it crosses above the upper band. Naturally adapts to volatility — bands widen in volatile conditions and tighten in calm ones. Can produce false signals during strong breakouts.',
    bestFor: 'Ranging markets with defined volatility',
    paramDefs: [
      { key:'period', label:'MA Period',            min:5, max:50, step:1,   hint:'Moving average lookback for the middle band' },
      { key:'mult',   label:'Std Dev Multiplier',   min:1, max:4,  step:0.5, hint:'Band width — 1=68%, 2=95%, 3=99.7% of prices contained' },
    ]
  },
];

// ──────────────────────────────────────────────────────────────────────────────
// TECHNICAL INDICATORS
// ──────────────────────────────────────────────────────────────────────────────
function sma(arr, n) {
  if (arr.length < n) return null;
  return arr.slice(-n).reduce((a,b) => a+b, 0) / n;
}

function ema(arr, n) {
  if (arr.length < n) return null;
  const k = 2 / (n + 1);
  let val = arr.slice(0, n).reduce((a,b) => a+b, 0) / n;
  for (let i = n; i < arr.length; i++) val = arr[i] * k + val * (1 - k);
  return val;
}

function rsi(arr, n = 14) {
  if (arr.length < n + 1) return null;
  const diffs  = arr.slice(1).map((v,i) => v - arr[i]);
  const recent = diffs.slice(-n);
  const avgG   = recent.filter(d => d > 0).reduce((a,b) => a+b, 0) / n;
  const avgL   = recent.filter(d => d < 0).map(d => -d).reduce((a,b) => a+b, 0) / n;
  if (avgL === 0) return 100;
  return 100 - 100 / (1 + avgG / avgL);
}

function macdIndicator(arr, fast=12, slow=26, sig=9) {
  if (arr.length < slow + sig) return null;
  const hist = [];
  for (let i = slow; i <= arr.length; i++) {
    const f = ema(arr.slice(0, i), fast);
    const s = ema(arr.slice(0, i), slow);
    if (f != null && s != null) hist.push(f - s);
  }
  if (hist.length < sig) return null;
  const macdNow = hist[hist.length - 1];
  const sigNow  = ema(hist, sig);
  return { macd: macdNow, signal: sigNow, histo: macdNow - sigNow };
}

function bollingerBands(arr, n = 20, mult = 2) {
  if (arr.length < n) return null;
  const slice = arr.slice(-n);
  const mean  = slice.reduce((a,b) => a+b, 0) / n;
  const std   = Math.sqrt(slice.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / n);
  return { upper: mean + mult*std, mid: mean, lower: mean - mult*std };
}

// ──────────────────────────────────────────────────────────────────────────────
// SIGNAL GENERATION  — returns 'BUY' | 'SELL' | null
// ──────────────────────────────────────────────────────────────────────────────
function getSignal(strategy, closes) {
  if (closes.length < 40) return null;
  const prev = closes.slice(0, -1);

  switch (strategy.id) {
    case 'sma': {
      const sNow  = sma(closes, strategy.shortP), lNow  = sma(closes, strategy.longP);
      const sPrev = sma(prev,   strategy.shortP), lPrev = sma(prev,   strategy.longP);
      if (!sNow || !lNow || !sPrev || !lPrev) return null;
      if (sPrev <= lPrev && sNow > lNow) return 'BUY';
      if (sPrev >= lPrev && sNow < lNow) return 'SELL';
      return null;
    }
    case 'rsi': {
      const rNow  = rsi(closes, strategy.period ?? 14);
      const rPrev = rsi(prev,   strategy.period ?? 14);
      if (rNow == null || rPrev == null) return null;
      if (rPrev >= strategy.lo && rNow < strategy.lo) return 'BUY';
      if (rPrev <= strategy.hi && rNow > strategy.hi) return 'SELL';
      return null;
    }
    case 'macd': {
      const mNow  = macdIndicator(closes, strategy.fast ?? 12, strategy.slow ?? 26, strategy.sig ?? 9);
      const mPrev = macdIndicator(prev,   strategy.fast ?? 12, strategy.slow ?? 26, strategy.sig ?? 9);
      if (!mNow || !mPrev) return null;
      if (mPrev.histo < 0 && mNow.histo >= 0) return 'BUY';
      if (mPrev.histo > 0 && mNow.histo <= 0) return 'SELL';
      return null;
    }
    case 'bb': {
      const bbNow  = bollingerBands(closes, strategy.period ?? 20, strategy.mult ?? 2);
      const bbPrev = bollingerBands(prev, strategy.period ?? 20, strategy.mult ?? 2);
      if (!bbNow || !bbPrev) return null;
      const cur = closes[closes.length - 1];
      const prv = closes[closes.length - 2];
      if (prv > bbPrev.lower && cur <= bbNow.lower) return 'BUY';
      if (prv < bbPrev.upper && cur >= bbNow.upper) return 'SELL';
      return null;
    }
  }
  return null;
}

// ──────────────────────────────────────────────────────────────────────────────
// PORTFOLIO
// ──────────────────────────────────────────────────────────────────────────────
function initPortfolio() {
  return { cash: STARTING_CAPITAL, positions: {}, trades: [], valueHistory: [] };
}

function portfolioValue(p, prices) {
  let v = p.cash;
  for (const [sym, pos] of Object.entries(p.positions))
    v += pos.shares * (prices[sym] ?? pos.avgCost);
  return v;
}

function executeTrade(portfolio, symbol, signal, price, totalVal) {
  const p = {
    ...portfolio,
    positions: { ...portfolio.positions },
    trades:    [...portfolio.trades],
  };

  if (signal === 'BUY') {
    if (p.positions[symbol]) return null;
    if (Object.keys(p.positions).length >= MAX_POSITIONS) return null;
    const alloc  = totalVal * POSITION_PCT;
    const actual = Math.min(alloc, p.cash);
    if (actual < price) return null;
    const shares = Math.floor(actual / price);
    if (shares < 1) return null;
    p.positions[symbol] = { shares, avgCost: price };
    p.cash -= shares * price;
    const t = { ts: new Date().toISOString(), symbol, action:'BUY', shares, price, value: shares*price, pnl: 0 };
    p.trades = [t, ...p.trades].slice(0, 300);
    return { portfolio: p, trade: t };
  }

  if (signal === 'SELL') {
    const pos = p.positions[symbol];
    if (!pos) return null;
    const value = pos.shares * price;
    const pnl   = (price - pos.avgCost) * pos.shares;
    p.cash += value;
    delete p.positions[symbol];
    const t = { ts: new Date().toISOString(), symbol, action:'SELL', shares: pos.shares, price, value, pnl };
    p.trades = [t, ...p.trades].slice(0, 300);
    return { portfolio: p, trade: t };
  }

  return null;
}

// ──────────────────────────────────────────────────────────────────────────────
// PERFORMANCE STATS
// ──────────────────────────────────────────────────────────────────────────────
function calcPerformance(portfolio) {
  const sells = portfolio.trades.filter(t => t.action === 'SELL');
  if (sells.length === 0) return null;
  const wins   = sells.filter(t => t.pnl > 0);
  const losses = sells.filter(t => t.pnl < 0);
  const winRate     = wins.length / sells.length;
  const avgGain     = wins.length   ? wins.reduce((s, t)   => s + t.pnl, 0) / wins.length   : 0;
  const avgLoss     = losses.length ? losses.reduce((s, t) => s + t.pnl, 0) / losses.length : 0;
  const grossGain   = wins.reduce((s, t) => s + t.pnl, 0);
  const grossLoss   = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
  const profitFactor = grossLoss > 0 ? grossGain / grossLoss : grossGain > 0 ? 9.99 : 0;
  const best  = sells.reduce((m, t) => t.pnl > m.pnl ? t : m, sells[0]);
  const worst = sells.reduce((m, t) => t.pnl < m.pnl ? t : m, sells[0]);
  return { winRate, totalTrades: sells.length, wins: wins.length, losses: losses.length,
           avgGain, avgLoss, profitFactor, grossGain, grossLoss, best, worst };
}

// ──────────────────────────────────────────────────────────────────────────────
// ALPACA API HELPERS
// ──────────────────────────────────────────────────────────────────────────────
async function alpacaGet(url, key, secret) {
  const res = await fetch(url, {
    headers: { 'APCA-API-KEY-ID': key, 'APCA-API-SECRET-KEY': secret },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`${res.status}: ${text}`);
  }
  return res.json();
}

async function fetchBars(symbols, timeframe, limit, key, secret) {
  const result = {};
  const batchSize = 10;
  for (let i = 0; i < symbols.length; i += batchSize) {
    const batch = symbols.slice(i, i + batchSize).join(',');
    const url   = `${DATA_API}/v2/stocks/bars?symbols=${batch}&timeframe=${timeframe}&limit=${limit}&adjustment=raw&feed=iex`;
    try {
      const data = await alpacaGet(url, key, secret);
      Object.assign(result, data.bars ?? {});
    } catch (e) { /* skip failed batches */ }
  }
  return result;
}

async function fetchLatestTrades(symbols, key, secret) {
  const result = {};
  const batchSize = 10;
  for (let i = 0; i < symbols.length; i += batchSize) {
    const batch = symbols.slice(i, i + batchSize).join(',');
    const url   = `${DATA_API}/v2/stocks/trades/latest?symbols=${batch}&feed=iex`;
    try {
      const data = await alpacaGet(url, key, secret);
      Object.assign(result, data.trades ?? {});
    } catch (e) { /* skip */ }
  }
  return result;
}

async function fetchClock(key, secret) {
  return alpacaGet(`${BROKER_API}/v2/clock`, key, secret);
}

// ──────────────────────────────────────────────────────────────────────────────
// SPARKLINE
// ──────────────────────────────────────────────────────────────────────────────
function Sparkline({ data, color }) {
  if (!data || data.length < 2) return <div style={{height:28}}/>;
  const min    = Math.min(...data);
  const max    = Math.max(...data);
  const range  = max - min || 1;
  const heights = data.map(v => ((v - min) / range) * 24 + 4);
  return (
    <div className="sparkline">
      {heights.map((h, i) => (
        <div key={i} className="sp-bar" style={{ height: h, background: color, opacity: .4 + (i/heights.length)*.6 }}/>
      ))}
    </div>
  );
}

function SetupScreen({ onConnect }) {
  const [key, setKey]         = useState(() => localStorage.getItem('alpaca_key')    || '');

  const [error, setError]     = useState('');

  const connect = async () => {
    setLoading(true); setError('');
    try {
      const clock = await fetchClock(key, secret);
      localStorage.setItem('alpaca_key',    key);
      localStorage.setItem('alpaca_secret', secret);
      onConnect(key, secret, clock);
    } catch(e) {
      setError(`Connection failed — ${e.message}. Make sure you're using Paper Trading API keys from alpaca.markets.`);
    }
    setLoading(false);
  };

  return (
    <div className="setup-wrap">
      <div className="setup-card">
        <div className="logo-row">
          <span className="icon">📈</span>

        </div>
        <div className="field-wrap">
          <label className="field-label">Alpaca Secret Key</label>
          <input className="input-field" type="password" placeholder="••••••••••••••••••••••••••••••••"
            value={secret} onChange={e => setSecret(e.target.value)} onKeyDown={e => e.key==='Enter' && connect()} />

// ──────────────────────────────────────────────────────────────────────────────
// PORTFOLIO COMPARISON CHART
// ──────────────────────────────────────────────────────────────────────────────
function PortfolioChart({ portfolios }) {
  const ref   = useRef(null);
  const chart = useRef(null);

  useEffect(() => {
    const ctx = ref.current?.getContext('2d');
    if (!ctx) return;

    const maxLen   = Math.max(...portfolios.map(p => p.valueHistory.length), 2);
    const labels   = Array.from({ length: maxLen }, (_, i) => i === 0 ? 'Start' : `T${i}`);
    const datasets = STRATEGIES.map((s, i) => ({
      label: s.name,
      data:  portfolios[i].valueHistory,
      borderColor: s.color,
      backgroundColor: s.color + '12',
      borderWidth: 2,
      pointRadius: 0,
      fill: false,
      tension: 0.35,
    }));
    datasets.push({
      label: 'Baseline ($100k)',
      data:  Array(maxLen).fill(STARTING_CAPITAL),
      borderColor: '#1e2040',
      borderWidth: 1,
      borderDash: [5, 5],
      pointRadius: 0,
      fill: false,
    });

    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        plugins: {
          legend: { labels: { color: '#475569', font: { size: 11, family: 'monospace' }, boxWidth: 12 } },
          tooltip: {
            backgroundColor: '#0f0f1e',
            borderColor: '#1e2040',
            borderWidth: 1,
            titleColor: '#64748b',
            bodyColor: '#e2e8f0',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: $${(ctx.raw||0).toLocaleString('en-US', { maximumFractionDigits: 0 })}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#2a2a4a', font: { size: 9 } }, grid: { color: '#0d0d1a' } },
          y: {
            ticks: { color: '#334155', font: { size: 10 }, callback: v => '$' + (v/1000).toFixed(0) + 'k' },
            grid:  { color: '#0d0d1a' },
          }
        }
      }
    });
    return () => chart.current?.destroy();
  }, [portfolios]);

  return <div className="chart-wrap"><canvas ref={ref}/></div>;
}

// ──────────────────────────────────────────────────────────────────────────────
// POSITIONS TABLE
// ──────────────────────────────────────────────────────────────────────────────
function PositionsTable({ portfolios, prices }) {
  const rows = [];
  STRATEGIES.forEach((s, i) => {
    Object.entries(portfolios[i].positions).forEach(([sym, pos]) => {
      const cur   = prices[sym] ?? pos.avgCost;
      const pnl   = (cur - pos.avgCost) * pos.shares;
      const pnlPct = ((cur - pos.avgCost) / pos.avgCost) * 100;
      rows.push({ strat: s, sym, shares: pos.shares, avgCost: pos.avgCost, cur, value: cur*pos.shares, pnl, pnlPct });
    });
  });

  if (rows.length === 0) return <div className="empty">No open positions yet — algos are scanning for signals…</div>;

  return (
    <div className="tbl-wrap tbl-scroll">
      <table>
        <thead>
          <tr>
            <th>Strategy</th><th>Symbol</th><th>Shares</th>
            <th>Avg Cost</th><th>Current</th><th>Mkt Value</th><th>P&amp;L</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i}>
              <td><span style={{ color: r.strat.color, fontSize:10 }}>{r.strat.name}</span></td>
              <td style={{ fontWeight:600 }}>{r.sym}</td>
              <td>{r.shares.toLocaleString()}</td>
              <td>${r.avgCost.toFixed(2)}</td>
              <td>${r.cur.toFixed(2)}</td>
              <td>${r.value.toLocaleString('en-US', { maximumFractionDigits:0 })}</td>
              <td className={r.pnl >= 0 ? 'pos' : 'neg'}>
                {r.pnl >= 0 ? '+' : ''}{r.pnlPct.toFixed(2)}%
                <span style={{ fontSize:10, marginLeft:4 }}>
                  ({r.pnl >= 0 ? '+' : '−'}${Math.abs(r.pnl).toFixed(0)})
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

  const pnlPct   = (pnl / STARTING_CAPITAL) * 100;

}

// WATCHLIST EDITOR
// ──────────────────────────────────────────────────────────────────────────────
function WatchlistEditor({ watchlist, setWatchlist, addLog }) {
  const [input, setInput] = React.useState('');
  const [error, setError] = React.useState('');

  const add = () => {
    const sym = input.trim().toUpperCase();
    if (!sym) return;
    if (watchlist.includes(sym)) { setError(`${sym} is already in the watchlist`); return; }
    if (sym.length > 6) { setError('Symbol too long'); return; }
    setWatchlist(prev => [...prev, sym]);
    addLog(`Watchlist: added ${sym}`);
    setInput(''); setError('');
  };

  const remove = (sym) => {
    setWatchlist(prev => prev.filter(s => s !== sym));
    addLog(`Watchlist: removed ${sym}`);
  };

  const reset = () => {
    setWatchlist([...DEFAULT_WATCHLIST]);
    addLog('Watchlist: reset to defaults');
  };

  return (
    <div className="wl-editor">
      <div className="wl-header">
        <span className="wl-title">Watchlist — {watchlist.length} symbols</span>
        <button className="wl-reset" onClick={reset}>↺ Reset to defaults</button>
      </div>
      <div className="wl-add-row">
        <input
          className="wl-input"
          placeholder="Add ticker, e.g. COIN"
          value={input}
          onChange={e => { setInput(e.target.value.toUpperCase()); setError(''); }}
          onKeyDown={e => e.key === 'Enter' && add()}
          maxLength={6}
        />
        <button className="btn-wl-add" onClick={add}>+ Add</button>
      </div>
      {error && <div style={{ color:'#ef4444', fontSize:11, marginBottom:10 }}>{error}</div>}
      <div className="wl-chips">
        {watchlist.map(sym => (
          <div key={sym} className="wl-chip">
            {sym}
            <button className="wl-chip-remove" onClick={() => remove(sym)} title="Remove">×</button>
          </div>
        ))}
      </div>
      <div style={{ color:'#334155', fontSize:10, marginTop:14, lineHeight:1.6 }}>
        Changes take effect on the next data refresh. Algos will only trade symbols in this list.
        Removing a symbol does not close existing positions.
      </div>
    </div>
  );
}

                    <span className={s.signal === 'BUY' ? 'pos' : 'neg'} style={{ fontWeight:600 }}>{s.signal}</span>
                  </td>
                  <td>${s.price.toFixed(2)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// STRATEGIES TAB
// ──────────────────────────────────────────────────────────────────────────────
function StrategiesTab({ params, setParams, setPortfolios, portfolios, addLog }) {
  // local draft params — only committed when user hits Apply
  const [draft, setDraft] = React.useState(params.map(p => ({ ...p })));

  const updateDraft = (i, key, value) => {
    setDraft(prev => {
      const next = prev.map(p => ({ ...p }));
      next[i][key] = Number(value);
      return next;
    });
  };

  const applyParams = (i) => {
    setParams(prev => { const n = [...prev]; n[i] = { ...draft[i] }; return n; });
    setPortfolios(prev => { const n = [...prev]; n[i] = initPortfolio(); return n; });
    addLog(`[${STRATEGIES[i].name}]  Parameters updated & portfolio reset`);
  };

  const resetDefaults = (i) => {
    const def = { ...STRATEGIES[i].defaultParams };
    setDraft(prev => { const n = [...prev]; n[i] = def; return n; });
    setParams(prev => { const n = [...prev]; n[i] = def; return n; });
    setPortfolios(prev => { const n = [...prev]; n[i] = initPortfolio(); return n; });
    addLog(`[${STRATEGIES[i].name}]  Reset to default parameters`);
  };

  const isDirty = (i) => {
    return JSON.stringify(draft[i]) !== JSON.stringify(params[i]);
  };

  return (
    <div className="strat-grid">
      {STRATEGIES.map((s, i) => (
        <div key={s.id} className="strat-explain-card" style={{'--accent': s.color}}>
          <style>{`.strat-explain-card:nth-child(${i+1})::before { background:${s.color}; }`}</style>
          <div className="strat-card-header">
            <div className="strat-card-name" style={{ color: s.color }}>{s.name}</div>
            <div className="strat-card-badge">Best for: {s.bestFor}</div>
          </div>
          <div className="strat-tagline">{s.tagline}</div>
          <div className="strat-desc">{s.description}</div>

          <div className="strat-params-title">⚙ Parameters — tune &amp; apply</div>
          {s.paramDefs.map(pd => (
            <div key={pd.key} className="param-row">
              <div className="param-row-header">
                <span className="param-label">{pd.label}</span>
                <span className="param-val" style={{ color: s.color }}>{draft[i][pd.key]}</span>
              </div>
              <input
                type="range"
                className="param-slider"
                min={pd.min} max={pd.max} step={pd.step}
                value={draft[i][pd.key]}
                onChange={e => updateDraft(i, pd.key, e.target.value)}
                style={{ accentColor: s.color }}
              />
              <div className="param-hint">{pd.hint}</div>
            </div>
          ))}

          <div className="param-actions">
            <button className="btn-apply" onClick={() => applyParams(i)}
              style={{ background: isDirty(i) ? s.color : '#1a1a2e', color: isDirty(i) ? '#fff' : '#475569' }}>
              {isDirty(i) ? '✓ Apply & Reset Portfolio' : '✓ Applied'}
            </button>
            <button className="btn-defaults" onClick={() => resetDefaults(i)}>↺ Defaults</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// PERFORMANCE TAB
// ──────────────────────────────────────────────────────────────────────────────
function PerformanceTab({ portfolios, prices }) {
  const fmt   = (n, dec=2) => n >= 0 ? `+$${n.toFixed(dec)}` : `-$${Math.abs(n).toFixed(dec)}`;
  const fmtPf = (n) => n >= 9.99 ? '∞' : n.toFixed(2);

  return (
    <div>
      <div className="perf-header">Closed-trade performance — updates after each SELL</div>
      <div className="perf-grid">
        {STRATEGIES.map((s, i) => {
          const perf = calcPerformance(portfolios[i]);
          const val  = portfolioValue(portfolios[i], prices);
          const pnl  = val - STARTING_CAPITAL;
          return (
            <div key={s.id} className="perf-card" style={{ borderLeftColor: s.color }}>
              <div className="perf-card-name" style={{ color: s.color }}>{s.name}</div>
              {perf ? (
                <>
                  <div className="perf-stats-row">
                    <div className="perf-stat">
                      <div className="perf-stat-label">Win Rate</div>
                      <div className="perf-stat-val" style={{ color: perf.winRate >= .5 ? '#10b981' : '#ef4444' }}>
                        {(perf.winRate * 100).toFixed(0)}%
                      </div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">Trades</div>
                      <div className="perf-stat-val">{perf.totalTrades}</div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">Profit Factor</div>
                      <div className="perf-stat-val" style={{ color: perf.profitFactor >= 1 ? '#10b981' : '#ef4444' }}>
                        {fmtPf(perf.profitFactor)}
                      </div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">Avg Win</div>
                      <div className="perf-stat-val pos">{perf.avgGain > 0 ? `+$${perf.avgGain.toFixed(0)}` : '—'}</div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">Avg Loss</div>
                      <div className="perf-stat-val neg">{perf.avgLoss < 0 ? `-$${Math.abs(perf.avgLoss).toFixed(0)}` : '—'}</div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">Portfolio P&amp;L</div>
                      <div className={`perf-stat-val ${pnl >= 0 ? 'pos' : 'neg'}`}>{pnl >= 0 ? '+' : ''}{((pnl/STARTING_CAPITAL)*100).toFixed(2)}%</div>
                    </div>
                  </div>
                  <div className="perf-trade-row">
                    <div className="perf-stat">
                      <div className="perf-stat-label">🏆 Best Trade</div>
                      <div className="perf-stat-val pos" style={{ fontSize:11 }}>
                        {perf.best.symbol} {fmt(perf.best.pnl, 0)}
                      </div>
                    </div>
                    <div className="perf-stat">
                      <div className="perf-stat-label">💀 Worst Trade</div>
                      <div className="perf-stat-val neg" style={{ fontSize:11 }}>
                        {perf.worst.symbol} {fmt(perf.worst.pnl, 0)}
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                <div className="perf-empty">No closed trades yet — stats appear after first SELL</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Head-to-head comparison table */}
      <div style={{ marginTop:4 }}>
        <div className="perf-header" style={{ marginBottom:10 }}>Head-to-head comparison</div>
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Strategy</th>
                <th>Portfolio Value</th>
                <th>P&amp;L</th>
                <th>Win Rate</th>
                <th>Trades</th>
                <th>Profit Factor</th>
                <th>Avg Win</th>
                <th>Avg Loss</th>
              </tr>
            </thead>
            <tbody>
              {STRATEGIES.map((s, i) => {
                const perf = calcPerformance(portfolios[i]);
                const val  = portfolioValue(portfolios[i], prices);
                const pnl  = val - STARTING_CAPITAL;
                const pct  = (pnl / STARTING_CAPITAL) * 100;
                return (
                  <tr key={s.id}>
                    <td><span style={{ color: s.color, fontWeight:600 }}>{s.name}</span></td>
                    <td>${val.toLocaleString('en-US', { maximumFractionDigits:0 })}</td>
                    <td className={pnl >= 0 ? 'pos' : 'neg'}>{pnl >= 0 ? '+' : ''}{pct.toFixed(2)}%</td>
                    <td>{perf ? `${(perf.winRate*100).toFixed(0)}% (${perf.wins}W/${perf.losses}L)` : '—'}</td>
                    <td>{perf ? perf.totalTrades : '—'}</td>
                    <td>{perf ? fmtPf(perf.profitFactor) : '—'}</td>
                    <td className="pos">{perf && perf.avgGain > 0 ? `+$${perf.avgGain.toFixed(0)}` : '—'}</td>
                    <td className="neg">{perf && perf.avgLoss < 0 ? `-$${Math.abs(perf.avgLoss).toFixed(0)}` : '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// DASHBOARD
// ──────────────────────────────────────────────────────────────────────────────
function Dashboard({ apiKey, apiSecret, initClock, onDisconnect }) {
  // ── helpers to load persisted state ──
  const loadPortfolios = () => {
    try {
      const s = localStorage.getItem('algotrade_portfolios');
      if (s) return JSON.parse(s);
    } catch(_) {}
    return STRATEGIES.map(() => initPortfolio());
  };
  const loadParams = () => {
    try {
      const s = localStorage.getItem('algotrade_params');
      if (s) return JSON.parse(s);
    } catch(_) {}
    return STRATEGIES.map(s => ({ ...s.defaultParams }));
  };
  const loadWatchlist = () => {
    try {
      const s = localStorage.getItem('algotrade_watchlist');
      if (s) return JSON.parse(s);
    } catch(_) {}
    return [...DEFAULT_WATCHLIST];
  };

  // ── state ──
  const [prices,     setPrices]     = useState({});
  const [portfolios, setPortfolios] = useState(loadPortfolios);
  const [paused,     setPaused]     = useState(STRATEGIES.map(() => false));
  const [params,     setParams]     = useState(loadParams);
  const [watchlist,  setWatchlist]  = useState(loadWatchlist);
  const [signals,    setSignals]    = useState([]);
  const [marketOpen, setMarketOpen] = useState(initClock?.is_open ?? false);
  const [tab,        setTab]        = useState('overview');
  const [status,     setStatus]     = useState('Initializing…');
  const [lastUpdate, setLastUpdate] = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [logs,       setLogs]       = useState([]);
  const [countdown,  setCountdown]  = useState(POLL_MS / 1000);

  // ── refs to avoid stale closures in interval ──
  const pricesRef     = useRef({});
  const barsRef       = useRef({});
  const portfoliosRef = useRef(portfolios);
  const pausedRef     = useRef(paused);
  const paramsRef     = useRef(params);
  const watchlistRef  = useRef(watchlist);

  useEffect(() => { portfoliosRef.current = portfolios; }, [portfolios]);
  useEffect(() => { pausedRef.current     = paused;     }, [paused]);
  useEffect(() => { pricesRef.current     = prices;     }, [prices]);
  useEffect(() => { paramsRef.current     = params;     }, [params]);
  useEffect(() => { watchlistRef.current  = watchlist;  }, [watchlist]);

  // ── persist to localStorage ──
  useEffect(() => {
    try { localStorage.setItem('algotrade_portfolios', JSON.stringify(portfolios)); } catch(_) {}
  }, [portfolios]);
  useEffect(() => {
    try { localStorage.setItem('algotrade_params', JSON.stringify(params)); } catch(_) {}
  }, [params]);
  useEffect(() => {
    try { localStorage.setItem('algotrade_watchlist', JSON.stringify(watchlist)); } catch(_) {}
  }, [watchlist]);

  const addLog = useCallback(msg => {
    const line = `${new Date().toLocaleTimeString()}  ${msg}`;
    setLogs(prev => [line, ...prev].slice(0, 80));
  }, []);

  // ── run algo logic against current bars + prices ──
  const runAlgos = useCallback((currentBars, currentPrices, currentPortfolios, currentPaused) => {
    const newSignals = [];
    const updated = currentPortfolios.map((portfolio, i) => {
      const strategy  = STRATEGIES[i];
      let   port      = { ...portfolio, positions: {...portfolio.positions}, trades: [...portfolio.trades] };
      const totalVal  = portfolioValue(port, currentPrices);

      // record value snapshot
      port.valueHistory = [...(port.valueHistory ?? []), totalVal].slice(-200);

      if (currentPaused[i]) return port;

      // scan every symbol
      const stratWithParams = { ...strategy, ...(paramsRef.current[i] ?? strategy.defaultParams) };
      const currentWatchlist = watchlistRef.current;
      for (const sym of currentWatchlist) {
        const symBars = currentBars[sym];
        if (!symBars || symBars.length < 40) continue;
        const closes  = symBars.map(b => parseFloat(b.c));
        const signal  = getSignal(stratWithParams, closes);
        if (!signal) continue;
        const price   = currentPrices[sym] ?? closes[closes.length - 1];
        // record signal in timeline
        newSignals.push({ ts: new Date().toISOString(), strategy: strategy.name, color: strategy.color, stratId: strategy.id, symbol: sym, signal, price });
        const result  = executeTrade(port, sym, signal, price, totalVal);
        if (result) {
          port = result.portfolio;
          addLog(`[${strategy.name}]  ${signal}  ${sym}  @ $${price.toFixed(2)}`);
        }
      }
      return port;
    });

    setPortfolios(updated);
    portfoliosRef.current = updated;
    if (newSignals.length > 0) {
      setSignals(prev => [...newSignals, ...prev].slice(0, 500));
    }
    return updated;
  }, [addLog]);

  // ── fetch bars + latest prices + run algos ──
  const refresh = useCallback(async (isInit = false) => {
    setStatus('Fetching data…');
    try {
      // bars
      const activeWatchlist = watchlistRef.current;
      const newBars = await fetchBars(activeWatchlist, '5Min', isInit ? BARS_WARMUP : 6, apiKey, apiSecret);
      if (isInit) {
        barsRef.current = newBars;
        addLog(`Loaded historical data for ${Object.keys(newBars).length} symbols`);
      } else {
        const merged = { ...barsRef.current };
        Object.entries(newBars).forEach(([sym, nb]) => {
          const ex  = merged[sym] ?? [];
          const cut = ex.length ? ex[ex.length-1].t : '';
          const add = nb.filter(b => b.t > cut);
          merged[sym] = [...ex, ...add].slice(-BARS_WARMUP);
        });
        barsRef.current = merged;
      }

      // latest prices
      const trades = await fetchLatestTrades(activeWatchlist, apiKey, apiSecret);
      const lp = {};
      Object.entries(trades).forEach(([sym, t]) => { lp[sym] = t.p; });
      setPrices(lp);
      pricesRef.current = lp;
      addLog(`Prices updated for ${Object.keys(lp).length} symbols`);

      // market clock
      try {
        const clock = await fetchClock(apiKey, apiSecret);
        setMarketOpen(clock.is_open);
      } catch(_) {}

      // run algos
      runAlgos(barsRef.current, lp, portfoliosRef.current, pausedRef.current);
      setLastUpdate(new Date());
      setStatus('Live');
      setCountdown(POLL_MS / 1000);
    } catch(e) {
      setStatus('Error');
      addLog(`❌  ${e.message}`);
    }
  }, [apiKey, apiSecret, runAlgos, addLog]);

  // ── initial load ──
  useEffect(() => {
    refresh(true).finally(() => setLoading(false));
  }, []);

  // ── polling interval ──
  useEffect(() => {
    if (loading) return;
    const poll = setInterval(() => refresh(false), POLL_MS);
    const tick = setInterval(() => setCountdown(c => c <= 1 ? POLL_MS/1000 : c - 1), 1000);
    return () => { clearInterval(poll); clearInterval(tick); };
  }, [loading, refresh]);

  // ── pause / reset handlers ──
  const togglePause = i => {
    setPaused(prev => {
      const n = [...prev];
      n[i] = !n[i];
      addLog(`[${STRATEGIES[i].name}]  ${n[i] ? 'PAUSED' : 'RESUMED'}`);
      return n;
    });
  };
  const resetStrategy = i => {
    setPortfolios(prev => {
      const n = [...prev];
      n[i] = initPortfolio();
      portfoliosRef.current = n;
      return n;
    });
    addLog(`[${STRATEGIES[i].name}]  RESET to $${STARTING_CAPITAL.toLocaleString()}`);
  };

  // ── derived totals ──
  const totalVal = portfolios.reduce((s, p) => s + portfolioValue(p, prices), 0);
  const totalPnl = totalVal - STARTING_CAPITAL * 4;
  const totalPct = (totalPnl / (STARTING_CAPITAL * 4)) * 100;

  // ── loading screen ──
  if (loading) return (
    <div className="loading-screen">
      <div className="spinner"/>
      <div className="loading-msg">{status}</div>
      <div style={{ color:'#334155', fontSize:11 }}>Fetching {BARS_WARMUP} bars × {watchlist.length} symbols…</div>
    </div>
  );

  return (
    <div>
      {/* TOP BAR */}
      <div className="topbar">
        <div className="topbar-left">
          <span className="topbar-title">📈 AlgoTrade</span>
          <span className="topbar-sub">Simulator</span>
        </div>
        <div className="topbar-right">
          <div className="market-badge">
            <div className={`dot ${marketOpen ? 'dot-open' : 'dot-closed'}`}/>
            <span className={`status-text ${marketOpen ? 'status-open' : 'status-closed'}`}>
              {marketOpen ? 'Market Open' : 'Market Closed'}
            </span>
          </div>
          <span className="update-time">
            {lastUpdate ? `↺ ${lastUpdate.toLocaleTimeString()}  ·  next ${countdown}s` : status}
          </span>
          <button className="btn btn-refresh" onClick={() => refresh(false)}>↻ Refresh Now</button>
          <button className="btn" onClick={onDisconnect} style={{color:'#475569'}}>⚙ Change Keys</button>
        </div>
      </div>

      <div className="main">
        {/* SUMMARY STRIP */}
        <div className="summary-strip">
          <div className="summary-val">
            Combined Portfolio:&nbsp;<strong>${totalVal.toLocaleString('en-US',{maximumFractionDigits:0})}</strong>
          </div>
          <div className={totalPnl >= 0 ? 'pos' : 'neg'} style={{ fontSize:12 }}>
            {totalPnl >= 0 ? '+' : ''}{totalPct.toFixed(2)}% across all strategies
            &nbsp;({totalPnl >= 0 ? '+' : '−'}${Math.abs(totalPnl).toLocaleString('en-US',{maximumFractionDigits:0})})
          </div>
        </div>

        {/* STRATEGY CARDS */}
        <div className="cards-grid">
          {STRATEGIES.map((s, i) => (
            <StrategyCard
              key={s.id}
              strategy={s}
              portfolio={portfolios[i]}
              prices={prices}
              paused={paused[i]}
              onPause={() => togglePause(i)}
              onReset={() => resetStrategy(i)}
            />
          ))}
        </div>

        {/* MAIN PANEL */}
        <div className="panel">
          <div className="tab-row">
            {[
              { id:'overview',     label:'📊  Overview'    },
              { id:'positions',    label:'💼  Positions'   },
              { id:'trades',       label:'📝  Trade Log'   },
              { id:'signals',      label:'📡  Signals'     },
              { id:'performance',  label:'🏆  Performance' },
              { id:'strategies',   label:'📚  Strategies'  },
              { id:'watchlist',    label:'⚙  Watchlist'   },
              { id:'log',          label:'🔍  Activity Log' },
            ].map(t => (
              <div key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
                {t.label}
              </div>
            ))}
          </div>

          {/* OVERVIEW TAB */}
          {tab === 'overview' && (
            <>
              <div style={{ color:'#334155', fontSize:10, textTransform:'uppercase', letterSpacing:'.06em', marginBottom:10 }}>
                Portfolio Value Over Time
              </div>
              <PortfolioChart portfolios={portfolios} />
              <div className="mini-stats">
                {STRATEGIES.map((s, i) => {
                  const val  = portfolioValue(portfolios[i], prices);
                  const pnl  = val - STARTING_CAPITAL;
                  const pct  = (pnl / STARTING_CAPITAL) * 100;
                  return (
                    <div key={s.id} className="mini-stat" style={{ borderLeftColor: s.color }}>
                      <div className="ms-label">{s.name}</div>
                      <div className="ms-val">${val.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
                      <div className={`ms-pct ${pnl>=0?'pos':'neg'}`}>{pnl>=0?'+':''}{pct.toFixed(2)}%</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* POSITIONS TAB */}
          {tab === 'positions' && <PositionsTable portfolios={portfolios} prices={prices} />}

          {/* TRADE LOG TAB */}
          {tab === 'trades' && <TradeLog portfolios={portfolios} />}

          {/* SIGNALS TAB */}
          {tab === 'signals' && <SignalTimeline signals={signals} />}

          {/* PERFORMANCE TAB */}
          {tab === 'performance' && <PerformanceTab portfolios={portfolios} prices={prices} />}

          {/* STRATEGIES TAB */}
          {tab === 'strategies' && (
            <StrategiesTab
              params={params}
              setParams={setParams}
              setPortfolios={setPortfolios}
              portfolios={portfolios}
              addLog={addLog}
            />
          )}

          {/* WATCHLIST TAB */}
          {tab === 'watchlist' && (
            <WatchlistEditor
              watchlist={watchlist}
              setWatchlist={setWatchlist}
              addLog={addLog}
            />
          )}

          {/* ACTIVITY LOG TAB */}
          {tab === 'log' && (
            <div className="log-wrap">
              {logs.length === 0
                ? <div className="empty">Activity log is empty</div>
                : logs.map((l, i) => <div key={i} className="log-line">{l}</div>)
              }
            </div>
          )}
        </div>

        {/* TICKER STRIP */}
        <div className="ticker-strip">
          {watchlist.map(sym => {
            const p = prices[sym];
            return p ? (
              <div key={sym} className="ticker-chip">
                <span className="ticker-sym">{sym}</span>
                <span className="ticker-price">${p.toFixed(2)}</span>
              </div>
            ) : null;
          })}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ROOT
// ──────────────────────────────────────────────────────────────────────────────
function App() {
  const [session,       setSession]       = useState(null);
  const [autoConnecting, setAutoConnecting] = useState(true);

  // On first load, try to reconnect using saved keys
  useEffect(() => {
    const savedKey    = localStorage.getItem('alpaca_key');
    const savedSecret = localStorage.getItem('alpaca_secret');
    if (savedKey && savedSecret) {
      fetchClock(savedKey, savedSecret)
        .then(clock => setSession({ key: savedKey, secret: savedSecret, clock }))
        .catch(() => {}) // keys expired or invalid — fall through to setup screen
        .finally(() => setAutoConnecting(false));
    } else {
      setAutoConnecting(false);
    }
  }, []);

  const disconnect = () => {
    localStorage.removeItem('alpaca_key');
    localStorage.removeItem('alpaca_secret');
    setSession(null);
  };

  if (autoConnecting) return (
    <div className="loading-screen">
      <div className="spinner"/>
      <div className="loading-msg">Reconnecting…</div>
    </div>
  );

  if (!session) {
    return <SetupScreen onConnect={(key, secret, clock) => setSession({ key, secret, clock })} />;
  }
  return <Dashboard apiKey={session.key} apiSecret={session.secret} initClock={session.clock} onDisconnect={disconnect} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
